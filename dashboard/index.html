<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartShop — Learning Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">🛒</div>
      <div>
        <div class="brand-title">SmartShop</div>
        <div class="brand-sub">Learning Tracker</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-view="sprints">
        <span class="nav-icon">🏃</span>
        <span class="nav-label">Sprints</span>
        <span class="nav-badge" id="badge-active"></span>
      </button>
      <button class="nav-item" data-view="skills">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">Kỹ Năng</span>
      </button>
      <button class="nav-item" data-view="roadmap">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Lộ Trình</span>
      </button>
      <button class="nav-item" data-view="notes">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Ghi Chú</span>
        <span class="nav-badge" id="badge-notes"></span>
      </button>
      <button class="nav-item" data-view="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Cài Đặt</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div id="sidebar-clock"></div>
    </div>
  </aside>

  <!-- ── MOBILE TOGGLE ── -->
  <button id="menu-toggle" aria-label="Menu">☰</button>

  <!-- ── MAIN ── -->
  <div id="main-wrap">
    <div id="main">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-sprints"   class="view"></div>
      <div id="view-skills"    class="view"></div>
      <div id="view-roadmap"   class="view"></div>
      <div id="view-notes"     class="view"></div>
      <div id="view-settings"  class="view"></div>
    </div>
  </div>

</div>

<!-- ── MODAL ── -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
  <div id="modal-box">
    <div id="modal-head">
      <span id="modal-title"></span>
      <button id="modal-close-btn" aria-label="Đóng">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-foot">
      <button class="btn ghost" id="modal-cancel">Hủy</button>
      <button class="btn primary" id="modal-ok">Lưu</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM ── -->
<div id="confirm-overlay" class="hidden">
  <div id="confirm-box">
    <div id="confirm-icon">⚠️</div>
    <div id="confirm-msg"></div>
    <div id="confirm-foot">
      <button class="btn ghost" id="confirm-cancel">Hủy</button>
      <button class="btn danger" id="confirm-ok">Xóa</button>
    </div>
  </div>
</div>

<!-- ── TOASTS ── -->
<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
